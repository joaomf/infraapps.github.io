<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Em Manutenção</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #1B3A5C, #E8732A);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 40px 20px;
    }

    .icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 15px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    .status {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.2);
      font-size: 14px;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      opacity: 0.7;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="icon">🚧</div>

    <h1>Estamos em manutenção</h1>

    <p>
      Estamos trabalhando para melhorar sua experiência.<br>
      Voltamos em breve!
    </p>

    <div class="status">🔄 Atualizando sistema</div>

    <div class="footer">
      © 2026 InfraApps
    </div>
  </div>
</body>
</html>
